<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login Page</title>
    <style>

        div{
            box-shadow: 10PX black;
            margin-top: 5%;
            margin-left: 5%;
        
        }
        label{
            display: block;
            block-size: 10px;
            border-block-start-width: 20px;
            
        }

        input{
            width: 90%;
            padding: 18px;
            border-radius: 5px;
            
        }
        .container{
            width: 80%;
            justify-content: center;
            display: flex;
            align-items:center;
            box-shadow: 20px solid black;
            
    
        }
        button{
            background-color: blue;
            padding: 10px;
            width: 450px;
            border: 2px solid blue;
            border-radius: 8px;
            color: white;
        }
        button.hover{
            cursor: pointer;
        }

    </style>
</head>
<body>
    <div class="container">

     <form action="">
        <label for="username"> Username: </label><br>
        <input type="text" placeholder="enter your username"><br><br>

        <label for="email">E-mail: </label><br>
        <input type="email" placeholder="enter your email"><br><br>

        <label for="">Password: </label><br>
        <input type="password clas" placeholder="enter your password"> <br><br>
        <button>Submit</button>
     </form>
    </div>
</body>
</html>
