<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        body{
            display: flex;
            justify-content: center;
            align-items: center;
        }

        #btnON,
        #btnOFF{
            margin-top: 300px;
            margin-left: 100px;
        }
    </style>
</head>
<body>
    <img id="photo" src="https://www.w3schools.com/JS/pic_bulboff.gif" alt=""> <br>
    <button id="btnON" onclick="On()">Turn On</button>
    <button id="btnOFF" onclick="Off()">Turn Off</button>

    <script>
        function On(){
            let photo=document.querySelector("#photo")
            photo.src="https://www.w3schools.com/JS/pic_bulbon.gif"
        }

         function Off(){
            let photo=document.querySelector("#photo")
            photo.src="https://www.w3schools.com/JS/pic_bulboff.gif"
        }


        
    </script>
</body>
</html>
