<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Variable</title>
</head>
<body>
    <script>
        //let variable
        let a=10
        a=20
        console.log(a);

        {
            let b=12
        }

        console.log(b); //we cann't access the let variable outside the block

        //var variable
        var c=7
        console.log(c);

        {
            var b=55
        }
        console.log(b)

        //const variable
        const name="Chandra"
        console.log(name);

        name="Prakash"
         console.log(name);

         

    </script>
</body>
</html>
